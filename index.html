<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boiler Control System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Boiler Status</h1>
            <div class="controls">
                <button id="pollBtn">Start Polling</button>
                <label for="speedSlider">Interval:</label>
                <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1.0">
                <span id="speedValue">1.0</span>s
            </div>
            <span id="status" class="status">Connecting...</span>
    </header>

    <main class="dashboard-container">
        <section class="chart-section">
            <canvas id="tempChart"></canvas>
        </section>

        <section class="table-section">
            <div id="dataContainer">
                </div>
        </section>
    </main>

    <script src="lib/chart.js"></script>
    <script src="lib/chartjs-plugin-annotation.js"></script>
    <script src="js/chart-setup.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
